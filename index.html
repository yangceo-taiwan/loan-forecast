<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宏國地政 | 易丞地政 - 專業房貸評估系統 v5.5 (SSO Edition)</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        document.ondragstart = () => false;
    </script>
    <style>
        body { -webkit-user-select: none; user-select: none; font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #333; }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        :root { --nexus-navy: #0F2E46; --nexus-gold: #C5A065; --line-green: #06C755; }
        .brand-header { background: linear-gradient(180deg, var(--nexus-navy) 0%, #162a3b 100%); color: white; padding-bottom: 2.5rem; border-bottom: 4px solid var(--nexus-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn-link { display: flex; align-items: center; justify-content: center; padding: 0.8rem; border-radius: 0.8rem; font-weight: bold; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-line { background-color: var(--line-green); color: white; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(6, 199, 85, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 199, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 199, 85, 0); } }
        .pro-card { background: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .card-header { font-size: 1.1rem; font-weight: 700; color: var(--nexus-navy); border-bottom: 2px solid #f1f5f9; display: flex; align-items: center; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .nexus-input, .nexus-select { width: 100%; padding: 0.7rem; border-radius: 0.6rem; border: 1px solid #cbd5e1; transition: all 0.2s; }
        .res-box { text-align: center; padding: 1rem; border-radius: 0.8rem; border: 1px solid; }
        .res-box.safe { background: #ecfdf5; border-color: #6ee7b7; color: #047857; }
        .res-box.limit { background: #fff1f2; border-color: #fda4af; color: #be123c; }
        .res-val { font-size: 1.8rem; font-weight: 800; }
        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 1rem; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 50; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen relative">

    <transition name="fade">
        <div v-if="!isUnlocked" class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-[#0F2E46] to-[#162a3b] text-white">
            <div class="bg-white text-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-sm text-center transform transition-all relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#C5A065] opacity-10 rounded-full blur-2xl"></div>
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-[#C5A065] shadow-inner">
                    <i class="fas fa-shield-alt text-3xl text-[#C5A065]"></i>
                </div>
                <h2 class="text-2xl font-bold text-[#0F2E46] mb-2">宏國專屬試算系統</h2>
                <p class="text-sm text-gray-500 mb-6 leading-relaxed">本系統為宏國地政內部高階工具。<br>為保障服務品質，請透過官方帳號驗證身分。</p>
                <div v-if="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-600 font-bold text-left flex gap-2">
                    <i class="fas fa-exclamation-circle"></i><span>{{ errorMessage }}</span>
                </div>
                <button @click="loginWithLine" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white rounded-xl py-4 flex items-center justify-center font-bold text-base shadow-lg transition active:scale-95">
                    <i class="fab fa-line text-2xl mr-2"></i> 使用 LINE 登入並解鎖
                </button>
            </div>
            <div class="mt-8 text-xs text-blue-200 opacity-60 tracking-widest">© 2026 宏國地政 | 易丞地政</div>
        </div>
    </transition>

    <div v-if="isUnlocked" class="pb-24">
        <div class="brand-header px-6 pt-10 pb-20 rounded-b-[2.5rem]">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold tracking-widest text-[#C5A065] mb-1">宏國地政 | 易丞地政</h1>
                <p class="text-xs text-blue-100 opacity-70 tracking-[0.2em] uppercase">Professional Real Estate Evaluation</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <a href="https://line.me/R/ti/p/@604gpqef" target="_blank" class="btn-link btn-line col-span-2 py-3"><i class="fab fa-line mr-2"></i> 前往官方聊天室</a>
                <a href="https://www.facebook.com/062582589a/" target="_blank" class="btn-link bg-blue-600 text-white text-xs"><i class="fab fa-facebook mr-1"></i> 粉絲專頁</a>
                <a href="https://maps.app.goo.gl/qyKhdrKsG5QBo2BW8" target="_blank" class="btn-link bg-red-500 text-white text-xs"><i class="fas fa-map-marker-alt mr-1"></i> 地圖導航</a>
            </div>
        </div>

        <div class="px-4 -mt-10 relative z-10">
            <div class="pro-card">
                <div class="card-header"><i class="fas fa-user-circle mr-2"></i>1. 客戶背景資料</div>
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">Q1：客戶職業別</label>
                    <select v-model="occupation" class="nexus-select">
                        <option value="">-- 請選擇 --</option>
                        <option value="自營商">自營商/企業主</option>
                        <option value="受薪階級">一般受薪</option>
                        <option value="自由業">自由工作者</option>
                    </select>
                </div>
            </div>

            <div class="pro-card">
                <div class="card-header"><i class="fas fa-coins mr-2"></i>2. 財務狀況</div>
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-600">Q5：每月收入 (元)</label>
                    <input v-model.number="monthlyIncome" type="number" class="nexus-input border-l-4 border-blue-500" placeholder="例如：55000">
                    <label class="block text-sm font-bold text-gray-600">Q6：每月負債支出 (元)</label>
                    <input v-model.number="monthlyDebt" type="number" class="nexus-input border-l-4 border-red-500" placeholder="各項貸款總和">
                </div>
            </div>

            <div class="pro-card border-t-4 border-[#C5A065]">
                <div class="card-header justify-center text-lg">📊 最高額度試算</div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="res-box safe">
                        <div class="text-xs font-bold">✅ 宏國建議</div>
                        <div class="res-val">{{ safeLoan }}<span class="text-sm">萬</span></div>
                    </div>
                    <div class="res-box limit">
                        <div class="text-xs font-bold">🔥 市場極限</div>
                        <div class="res-val">{{ limitLoan }}<span class="text-sm">萬</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sticky-footer">
            <button onclick="sendToLine()" class="w-full bg-[#06C755] text-white font-bold py-3 rounded-full shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-line text-xl"></i> 評估完成！傳送結果
            </button>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
        setup() {
            const isUnlocked = ref(false);
            const errorMessage = ref("");
            // 🔴 鎖定您的新大腦網址
            const gasAuthUrl = "https://script.google.com/macros/s/AKfycbwiIbmZWvNkOZW1wPBSZT1b5MKcfeeU8LtfqOiPZE0gN0VPkxJDguhKmb6rTJnSWWBnCA/exec";

            onMounted(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const authStatus = urlParams.get('nexus_auth');
                if (authStatus === 'success') {
                    localStorage.setItem('hg_line_auth', 'true');
                    isUnlocked.value = true;
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else if (authStatus === 'failed_not_friend') {
                    localStorage.removeItem('hg_line_auth');
                    errorMessage.value = "授權失敗：系統偵測到您尚未加入好友或已封鎖。請重新登入並務必勾選加入好友。";
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else if (localStorage.getItem('hg_line_auth') === 'true') {
                    isUnlocked.value = true;
                }
            });

            const loginWithLine = () => {
                const currentBaseUrl = window.location.origin + window.location.pathname;
                window.location.href = `${gasAuthUrl}?state=${encodeURIComponent(currentBaseUrl)}`;
            };

            const occupation = ref("");
            const monthlyIncome = ref(null);
            const monthlyDebt = ref(null);
            const safeLoan = computed(() => {
                if (!monthlyIncome.value) return 0;
                let val = ((monthlyIncome.value * 0.55) - (monthlyDebt.value || 0));
                return val > 0 ? Math.floor((val / 4000) * 100) : 0;
            });
            const limitLoan = computed(() => {
                if (!monthlyIncome.value) return 0;
                let val = ((monthlyIncome.value * 0.70) - (monthlyDebt.value || 0));
                return val > 0 ? Math.floor((val / 4000) * 100) : 0;
            });

            window.sendToLine = () => {
                let text = `【房貸額度評估】\nQ1職業：${occupation.value}\nQ5月收：${monthlyIncome.value}\n✅建議：${safeLoan.value}萬`;
                window.location.href = `https://line.me/R/oaMessage/@604gpqef/?text=${encodeURIComponent(text)}`;
            };

            return { isUnlocked, errorMessage, loginWithLine, occupation, monthlyIncome, monthlyDebt, safeLoan, limitLoan };
        }
    }).mount('#app');
</script>
</body>
</html>
